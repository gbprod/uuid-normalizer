name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 7 * * 1"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        sf: ["6.4.*", "7.4.*", "8.0.*"]
        exclude:
          - php: "8.2"
            sf: "8.0.*"
          - php: "8.3"
            sf: "8.0.*"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php }}"
      - run: composer require symfony/serializer:${{ matrix.sf }} --no-update
      - run: composer require symfony/property-access:${{ matrix.sf }} --no-update
      - run: composer require symfony/property-info:${{ matrix.sf }} --no-update
      - run: composer update --no-interaction --prefer-dist
      - run: vendor/bin/phpunit --configuration phpunit.xml.dist
      - run: vendor/bin/phpstan analyse --level max src/
